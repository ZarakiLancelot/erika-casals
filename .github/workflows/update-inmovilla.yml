name: Update Inmovilla properties

on:
  schedule:
    - cron: '*/15 * * * *'  # cada 15 minutos
  workflow_dispatch:       # permite lanzarlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        run: node scripts/updateInmovillaFeed.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/inmovilla-properties-all.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el JSON, no se hace commit."
          else
            git commit -m "chore: update Inmovilla properties [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
