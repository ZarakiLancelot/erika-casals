name: Update Idealista Feed

on:
  schedule:
    # Cada 8 horas: 00:30, 08:30, 16:30 UTC
    - cron: '30 0,8,16 * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Update Idealista feed
        run: npm run update:idealista
        env:
          IDEALISTA_FTP_HOST: ${{ secrets.IDEALISTA_FTP_HOST }}
          IDEALISTA_FTP_USER: ${{ secrets.IDEALISTA_FTP_USER }}
          IDEALISTA_FTP_PASSWORD: ${{ secrets.IDEALISTA_FTP_PASSWORD }}

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code public/idealista-properties.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/idealista-properties.json
          git commit -m "🔄 Auto-update Idealista properties [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push
