name: Actualizar propiedades Inmovilla

on:
  schedule:
    # Cada día a las 3:00 AM (hora España peninsular = 2:00 UTC en invierno / 1:00 UTC en verano)
    - cron: '0 2 * * *'
  workflow_dispatch: # Permite lanzarlo manualmente desde GitHub

jobs:
  deploy:
    name: Disparar deploy en Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
